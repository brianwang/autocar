motor_driver:
  ros__parameters:
    protocol: "serial"            # "serial" | "tcp"
    serial_port: "/dev/ttyAMA0"
    serial_baud: 115200
    tcp_host: "127.0.0.1"
    tcp_port: 9999
    wheel_base: 0.178
    wheel_radius: 0.032
    max_speed: 0.5
    simulation: false

velocity_controller:
  ros__parameters:
    kp: 1.2
    ki: 0.3
    kd: 0.05
    max_linear_speed: 0.5
    max_linear_accel: 0.3
    control_rate: 50.0

steering_controller:
  ros__parameters:
    kp: 2.0
    ki: 0.1
    kd: 0.02
    max_angular_speed: 1.5
    max_angular_accel: 0.8
    control_rate: 50.0
