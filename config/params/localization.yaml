localization_fusion:
  ros__parameters:
    gps_min_satellites_outdoor: 6
    gps_max_hdop: 2.0
    gps_loss_timeout_s: 3.0
    slam_lock_timeout_s: 10.0
    transition_blend_time_s: 2.0
    outdoor_mode: "gps_imu_odom"
    indoor_mode: "cartographer_slam"

gps_driver:
  ros__parameters:
    port: "/dev/ttyAMA0"
    baud_rate: 9600
    frame_id: "gps_link"
    publish_rate: 10.0

imu_driver:
  ros__parameters:
    i2c_bus: 1
    address: 0x68
    frame_id: "imu_link"
    publish_rate: 100.0

lidar_driver:
  ros__parameters:
    port: "/dev/ttyUSB0"
    baud_rate: 230400
    frame_id: "laser_frame"
    angle_min: 0.0
    angle_max: 6.283
    range_min: 0.05
    range_max: 12.0
